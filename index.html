<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./output.css">
</head>

<body class="bg-[#d9e1f2] h-screen flex flex-col items-center justify-center">
    <section>
        <div id="card-container" class="bg-white w-64 rounded-xl p-4 flex flex-col gap-4">
            <div id="qr-code" class="">
                <img src="/image-qr-code.png" alt="QR code" class="w-full rounded-xl">
            </div>
            <div id="text-content" class="flex flex-col gap-3 text-center">
                <h1 class="mt-4 font-bold text-[15px] text-[#36495b]">Improve your front-end skills by building projects
                </h1>
                <p class="text-[#6b7280] text-[12px]">Scan the QR code to visit Frontend Mentor and take your coding
                    skills to the next level</p>
            </div>
        </div>
    </section>
</body>

</html>
